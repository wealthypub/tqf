<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080e1c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0e1628;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0dd9c8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0aada0;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Decorative signal arcs on left -->
  <circle cx="100" cy="315" r="80" fill="none" stroke="#0dd9c8" stroke-width="2" opacity="0.2"/>
  <circle cx="100" cy="315" r="120" fill="none" stroke="#0dd9c8" stroke-width="1.5" opacity="0.1"/>

  <!-- Center signal icon -->
  <g transform="translate(100, 315)">
    <!-- Arcs -->
    <path d="M -40 -40 Q -60 -60 -80 -80" fill="none" stroke="#0dd9c8" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
    <path d="M -20 -20 Q -40 -40 -60 -60" fill="none" stroke="#0dd9c8" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
    <path d="M 0 0 Q -20 -20 -40 -40" fill="none" stroke="#0dd9c8" stroke-width="3" stroke-linecap="round"/>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="6" fill="#0dd9c8"/>
  </g>

  <!-- Main content area -->
  <g>
    <!-- Title -->
    <text x="450" y="200" font-family="Inter, sans-serif" font-size="84" font-weight="900" fill="#0dd9c8" letter-spacing="-2">
      The Quiet Founder
    </text>

    <!-- Subtitle in Tamil -->
    <text x="450" y="270" font-family="Inter, sans-serif" font-size="48" font-weight="600" fill="#0aada0" letter-spacing="-1">
      அமைதியான நிறுவனர்
    </text>

    <!-- Tagline -->
    <text x="450" y="360" font-family="Inter, sans-serif" font-size="32" font-weight="600" fill="#dce8f5">
      A Sales &amp; Marketing Bible for the AI Era
    </text>

    <!-- Accent line -->
    <line x1="450" y1="385" x2="1100" y2="385" stroke="#0dd9c8" stroke-width="3"/>

    <!-- Features -->
    <text x="450" y="450" font-family="Inter, sans-serif" font-size="20" font-weight="500" fill="#7d96b8">
      37 Chapters • Bilingual • Offline Ready
    </text>

    <!-- CTA -->
    <text x="450" y="520" font-family="Inter, sans-serif" font-size="28" font-weight="700" fill="#0dd9c8">
      Read Online @ thewealthypub.com
    </text>
  </g>

  <!-- Right side decorative elements -->
  <g opacity="0.15">
    <circle cx="1050" cy="100" r="60" fill="#0dd9c8"/>
    <circle cx="1100" cy="500" r="80" fill="#0dd9c8"/>
    <rect x="950" y="350" width="150" height="150" fill="#0dd9c8" opacity="0.1"/>
  </g>
</svg>
