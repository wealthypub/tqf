<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg512" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080e1c"/>
      <stop offset="100%" stop-color="#0e2040"/>
    </linearGradient>
    <linearGradient id="glow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#0dd9c8"/>
      <stop offset="100%" stop-color="#0893a0"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg512)"/>

  <!-- Signal broadcast — outer arc -->
  <path d="M 256 295 Q 148 200 256 105 Q 364 200 256 295 Z"
    fill="none" stroke="url(#glow)" stroke-width="14" stroke-linejoin="round" opacity="0.25"/>
  <!-- Mid arc -->
  <path d="M 256 285 Q 166 205 256 125 Q 346 205 256 285 Z"
    fill="none" stroke="url(#glow)" stroke-width="12" stroke-linejoin="round" opacity="0.5"/>
  <!-- Inner arc -->
  <path d="M 256 272 Q 188 212 256 148 Q 324 212 256 272 Z"
    fill="none" stroke="url(#glow)" stroke-width="10" stroke-linejoin="round" opacity="0.8"/>

  <!-- Core dot -->
  <circle cx="256" cy="210" r="22" fill="url(#glow)"/>

  <!-- Stem -->
  <line x1="256" y1="275" x2="256" y2="350" stroke="url(#glow)" stroke-width="12" stroke-linecap="round" opacity="0.85"/>
  <!-- Base -->
  <line x1="196" y1="350" x2="316" y2="350" stroke="url(#glow)" stroke-width="12" stroke-linecap="round" opacity="0.5"/>

  <!-- "THE QUIET FOUNDER" text -->
  <text x="256" y="410" text-anchor="middle"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="38" font-weight="800" letter-spacing="4"
    fill="#0dd9c8" opacity="0.9">THE QUIET</text>
  <text x="256" y="458" text-anchor="middle"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="38" font-weight="800" letter-spacing="4"
    fill="#0dd9c8" opacity="0.55">FOUNDER</text>
</svg>
