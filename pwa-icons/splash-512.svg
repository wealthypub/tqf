<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="splashBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080e1c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0e1628;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="accentRadial" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#0dd9c8;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#0dd9c8;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#splashBg)"/>

  <!-- Radial glow -->
  <circle cx="256" cy="256" r="280" fill="url(#accentRadial)"/>

  <!-- Main icon with signal arcs -->
  <g transform="translate(256, 200)">
    <!-- Outer arc layers -->
    <circle cx="0" cy="0" r="100" fill="none" stroke="#0dd9c8" stroke-width="2" opacity="0.2"/>
    <circle cx="0" cy="0" r="75" fill="none" stroke="#0dd9c8" stroke-width="2.5" opacity="0.3"/>
    <circle cx="0" cy="0" r="50" fill="none" stroke="#0dd9c8" stroke-width="3" opacity="0.4"/>

    <!-- Signal arcs (broadcasting) -->
    <path d="M -35 -35 Q -50 -50 -65 -65" fill="none" stroke="#0dd9c8" stroke-width="4" stroke-linecap="round" opacity="0.9"/>
    <path d="M -15 -15 Q -35 -35 -55 -55" fill="none" stroke="#0dd9c8" stroke-width="4" stroke-linecap="round" opacity="0.95"/>
    <path d="M 5 5 Q -15 -15 -35 -35" fill="none" stroke="#0dd9c8" stroke-width="4" stroke-linecap="round"/>

    <!-- Center dot -->
    <circle cx="0" cy="0" r="8" fill="#0dd9c8"/>
  </g>

  <!-- Text section -->
  <text x="256" y="380" font-family="Inter, sans-serif" font-size="52" font-weight="900" fill="#0dd9c8" text-anchor="middle" letter-spacing="-1.5">
    The Quiet Founder
  </text>

  <text x="256" y="435" font-family="Inter, sans-serif" font-size="32" font-weight="600" fill="#0aada0" text-anchor="middle">
    அமைதியான நிறுவனர்
  </text>

  <!-- Accent line -->
  <line x1="120" y1="460" x2="392" y2="460" stroke="#0dd9c8" stroke-width="2" opacity="0.6"/>
</svg>
